name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test CitySmsService
      working-directory: ./CitySmsService
      run: |
        chmod +x mvnw
        ./mvnw clean test

    - name: Build and Test MyCityGov Core
      working-directory: ./mycitygov
      run: |
        chmod +x mvnw
        ./mvnw clean test
