name: SonarCloud Analysis

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    # 1. Add the database service here too!
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: municipality_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U user -d municipality_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Analyze MyCityGov Core with SonarCloud
        working-directory: ./mycitygov
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # 2. Pass the database connection properties so the tests pass
        run: |
          chmod +x mvnw
          ./mvnw verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=mycitygov-core \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5433/municipality_db \
            -Dspring.datasource.username=user \
            -Dspring.datasource.password=password

      - name: Analyze CitySmsService with SonarCloud
        working-directory: ./CitySmsService
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x mvnw
          ./mvnw verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=citysmsservice
