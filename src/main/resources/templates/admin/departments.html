<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Departments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar-custom">
    <div class="container d-flex justify-content-between">
        <span>MyCityGov</span>

        <div sec:authorize="isAuthenticated()">
            <span>
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>
            <span class="badge bg-light text-dark ms-2" sec:authentication="principal.role"></span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-3">
                <button type="submit" class="btn btn-sm btn-outline-light">
                    Logout
                </button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Departments</h2>
    </div>

    <table class="styled-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th> <th>Actions</th>     </tr>
        </thead>
        <tbody>
        <tr th:each="dept : ${departments}">
            <td th:text="${dept.id}"></td>
            <td th:text="${dept.name}"></td>
            <td th:text="${dept.description}"></td>
            <td>
                <a th:href="@{'/admin/departments/' + ${dept.id} + '/info'}"
                   class="btn-custom btn-primary-custom"
                   style="padding: 5px 10px; font-size: 0.9em;">
                    Edit / Info
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/admin/dashboard}" class="btn-custom btn-secondary-custom">Back to Dashboard</a>
    </div>
</div>
</body>
</html>
