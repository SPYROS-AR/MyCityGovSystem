<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between">
        <span>MyCityGov</span>

        <div sec:authorize="isAuthenticated()">
            <span>
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>
            <span class="badge bg-light text-dark ms-2" sec:authentication="principal.role"></span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-3">
                <button type="submit" class="btn btn-sm btn-outline-light">
                    Logout
                </button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>System Users</h2>
    </div>

    <div class="table-responsive">
        <table class="styled-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Username / Email</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>

                <td>
                        <span class="badge rounded-pill"
                              th:classappend="${#strings.toString(user.role) == 'ADMIN'} ? 'text-bg-danger' :
                                             (${#strings.toString(user.role) == 'EMPLOYEE'} ? 'text-bg-warning' : 'text-bg-info')"
                              th:text="${user.role}">
                        </span>
                </td>

                <td>
                    <a th:href="@{'/admin/users/edit/' + ${user.id}}" class="text-decoration-none text-primary fw-bold me-2">Edit</a>
                </td>
            </tr>

            <tr th:if="${users.isEmpty()}">
                <td colspan="4" class="text-center text-muted">No users found.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4 d-flex gap-3">
        <a th:href="@{/admin/dashboard}" class="btn-custom btn-secondary-custom">Back to Dashboard</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
