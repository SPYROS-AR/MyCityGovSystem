<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar-custom">
    <div class="container d-flex justify-content-between">
        <span>MyCityGov</span>

        <div sec:authorize="isAuthenticated()">
            <span>
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>
            <span class="badge bg-light text-dark ms-2" sec:authentication="principal.role"></span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-3">
                <button type="submit" class="btn btn-sm btn-outline-light">
                    Logout
                </button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>System Statistics</h2>

    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="p-3 bg-white shadow-sm border rounded text-center">
                <h6>Total Requests</h6>
                <h3 th:text="${stats.totalRequests}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="p-3 bg-white shadow-sm border rounded text-center">
                <h6>Pending</h6>
                <h3 th:text="${stats.pendingRequests}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="p-3 bg-white shadow-sm border rounded text-center">
                <h6>Registered Citizens</h6>
                <h3 th:text="${stats.totalCitizens}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="p-3 bg-white shadow-sm border rounded text-center">
                <h6 class="text-danger">Overdue (SLA)</h6>
                <h3 th:text="${stats.overdueRequests}" class="text-danger">0</h3>
            </div>
        </div>
    </div>

    <div class="d-flex gap-3">
        <a th:href="@{/admin/request-types}" class="btn-custom btn-primary-custom">Manage Request Types</a>
        <a th:href="@{/admin/departments}" class="btn-custom btn-secondary-custom">View Departments</a>
        <a th:href="@{/admin/users}" class="btn-custom btn-secondary-custom">View users</a>
    </div>
</div>
</body>
</html>
