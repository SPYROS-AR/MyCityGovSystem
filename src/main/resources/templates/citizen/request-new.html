<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>New Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
  <div class="container d-flex justify-content-between">
    <span>MyCityGov</span>
    <span>User: <strong>Citizen</strong></span>
  </div>
</nav>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Submit New Request</h2>
    <a th:href="@{/citizen/requests/my}" class="btn-custom btn-primary-custom">Back to Requests</a>
  </div>

  <form th:action="@{/citizen/requests}" method="post" style="max-width: 600px;">
    <div class="mb-3">
      <label class="form-label">Request Type:</label>
      <select name="requestTypeId" class="form-select" required>
        <option value="" disabled selected>Select...</option>
        <option th:each="type : ${requestTypes}"
                th:value="${type.id}"
                th:text="${type.name}"></option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Description:</label>
      <textarea name="description" class="form-control" rows="5" required></textarea>
    </div>

    <button type="submit" class="btn-custom btn-primary-custom">Submit</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
