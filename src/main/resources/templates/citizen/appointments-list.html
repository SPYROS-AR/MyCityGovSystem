<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Appointments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
  <div class="container d-flex justify-content-between">
    <span>MyCityGov</span>
    <span>User: <strong>Citizen</strong></span>
  </div>
</nav>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Appointments</h2>
    <div>
      <a th:href="@{/citizen/appointments/new}" class="btn-custom btn-primary-custom">Book Appointment</a>
      <a th:href="@{/citizen/requests/my}" class="btn-custom btn-secondary-custom">Back to Requests</a>
    </div>
  </div>

  <table class="styled-table">
    <thead>
    <tr>
      <th>Date & Time</th>
      <th>Department</th>
      <th>Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="app : ${appointments}">
      <td th:text="${#temporals.format(app.date, 'dd/MM/yyyy HH:mm')}"></td>
      <td th:text="${app.departmentName}"></td>
      <td>
                <span class="status-badge"
                      th:classappend="'status-' + ${app.status}"
                      th:text="${app.status}"></span>
      </td>
    </tr>
    <tr th:if="${#lists.isEmpty(appointments)}">
      <td colspan="3" class="text-center text-muted">No appointments found.</td>
    </tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
