<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Request Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between">
        <span>MyCityGov</span>

        <div sec:authorize="isAuthenticated()">
            <span>
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>
            <span class="badge bg-light text-dark ms-2" sec:authentication="principal.role"></span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-3">
                <button type="submit" class="btn btn-sm btn-outline-light">
                    Logout
                </button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <div>
            <h2 class="mb-1">Request <span th:text="${request?.protocolNumber}" style="color: #009879;"></span></h2>
            <span class="text-muted small">Submitted: <span
                    th:text="${#temporals.format(request?.submittedDate, 'dd/MM/yyyy')}"></span></span>
        </div>
        <div>
            <a th:href="@{/employee/dashboard}" class="btn-custom btn-primary-custom">Back to Dashboard</a> <br> <br>
            <span class="status-badge" th:classappend="'status-' + ${request?.status}"
                  th:text="${request?.status}"></span>
        </div>
    </div>

    <div class="row mb-5">
        <div class="col-md-6">
            <h4 style="color: #009879;">Citizen</h4>
            <div class="p-3 bg-light rounded">
                <p><strong>Name:</strong> <span
                        th:text="${request?.citizen?.firstName} + ' ' + ${request?.citizen?.lastName}"></span></p>
                <p><strong>Email:</strong> <span th:text="${request?.citizen?.email}"></span></p>
                <p><strong>Phone:</strong> <span th:text="${request?.citizen?.mobilePhoneNumber}"></span></p>
            </div>
        </div>
        <div class="col-md-6">
            <h4 style="color: #009879;">Info</h4>
            <div class="p-3 bg-light rounded">
                <p><strong>Type:</strong> <span th:text="${request?.requestType}"></span></p>
                <p><strong>Assigned:</strong> <span
                        th:text="${request?.assignedEmployee != null ? request.assignedEmployee.lastName : '-'}"></span>
                </p>
            </div>
        </div>
    </div>

    <div class="mb-5">
        <h4 style="color: #009879;">Description</h4>
        <div class="p-3 bg-light rounded" th:text="${request?.description}"></div>
    </div>

    <div class="mb-5">
        <h4 style="color: #009879;">History</h4>
        <table class="styled-table">
            <thead>
            <tr>
                <th>Date</th>
                <th>User</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${request?.logs}">
                <td th:text="${#temporals.format(log?.actionDate, 'dd/MM/yyyy HH:mm')}"></td>
                <td>
                    <span th:if="${log?.employee != null}" th:text="${log.employee.lastName}"></span>
                    <span th:if="${log?.employee == null}">System</span>
                </td>
                <td th:text="${log?.comment}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(request?.logs)}">
                <td colspan="3">No history available.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
