<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard | MyCityGov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-submitted { background-color: #ffc107; color: #000; } /* Κίτρινο */
        .status-processing { background-color: #17a2b8; color: #fff; } /* Μπλε */
        .status-completed { background-color: #28a745; color: #fff; } /* Πράσινο */
        .status-rejected { background-color: #dc3545; color: #fff; } /* Κόκκινο */
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">🏢 MyCityGov Employee</a>
        <span class="navbar-text">
            Logged in as: <strong>Giannis (Employee)</strong> </span>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">📋 Αιτήματα Τμήματος: <span class="text-primary">Καθαριότητα</span></h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Ημ/νία</th>
                    <th>Τύπος</th>
                    <th>Πολίτης</th>
                    <th>Κατάσταση</th>
                    <th>Υπεύθυνος</th>
                    <th class="text-end">Ενέργειες</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="req : ${requests}">
                    <td th:text="${req.protocolNumber}" class="fw-bold"></td>
                    <td th:text="${#temporals.format(req.submittedDate, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${req.requestType.name}"></td>
                    <td>
                        <span th:text="${req.citizen.firstName + ' ' + req.citizen.lastName}"></span><br>
                        <small class="text-muted" th:text="${req.citizen.nationalId}"></small>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${'status-' + #strings.toLowerCase(req.status)}"
                              th:text="${req.status}"></span>
                    </td>
                    <td>
                        <span th:if="${req.assignedEmployee == null}" class="text-muted fst-italic">- Μη ανατεθειμένο -</span>
                        <span th:if="${req.assignedEmployee != null}"
                              th:text="${req.assignedEmployee.firstName + ' ' + req.assignedEmployee.lastName}"
                              class="fw-bold text-primary"></span>
                    </td>
                    <td class="text-end">
                        <div class="d-flex justify-content-end gap-2">

                            <form th:if="${req.assignedEmployee == null}"
                                  th:action="@{/employee/request/{id}/assign(id=${req.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-primary">
                                    🙋‍♂️ Ανάληψη
                                </button>
                            </form>

                            <a th:href="@{/employee/request/{id}(id=${req.id})}" class="btn btn-sm btn-secondary">
                                👁️ Προβολή
                            </a>

                            <div th:if="${req.status.name() == 'PROCESSING'}" class="btn-group">
                                <form th:action="@{/employee/request/{id}/approve(id=${req.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-success">✔</button>
                                </form>
                                <form th:action="@{/employee/request/{id}/reject(id=${req.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-danger" style="margin-left: 5px;">✘</button>
                                </form>
                            </div>

                        </div>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(requests)}">
                    <td colspan="7" class="text-center py-4 text-muted">
                        Δεν υπάρχουν αιτήματα για το τμήμα σας.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
