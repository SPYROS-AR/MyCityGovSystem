<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied - 403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #f4f4f4;">

<div class="text-center">
    <h1 class="display-1 fw-bold" style="color: #009879;">403</h1>
    <h2 class="mb-4">Access Denied</h2>
    <p class="lead mb-4">Sorry, you don't have permission to access this page.</p>

    <div class="alert alert-warning d-inline-block" role="alert" sec:authorize="isAuthenticated()">
        Logged in as: <strong sec:authentication="name"></strong>
        with role: <strong sec:authentication="principal.authorities"></strong>
    </div>
    <br><br>

    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
        <a href="/" class="btn-custom btn-primary-custom px-4 gap-3">Go Home</a>

        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn-custom btn-secondary-custom px-4">Logout</button>
        </form>
    </div>
</div>

</body>
</html>
