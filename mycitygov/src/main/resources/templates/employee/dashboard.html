<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between">
        <span>MyCityGov</span>
        <span>User: <strong>Employee</strong></span>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Department Requests</h2>
        <a th:href="@{/employee/appointments}" class="btn-custom btn-primary-custom">Manage Appointments</a>
    </div>

    <table class="styled-table">
        <thead>
        <tr>
            <th>Protocol</th>
            <th>Date</th>
            <th>Type</th>
            <th>Citizen</th>
            <th>Status</th>
            <th>Assigned To</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="req : ${requests}">
            <td th:text="${req.protocolNumber}"></td>
            <td th:text="${#temporals.format(req.submittedDate, 'dd/MM/yyyy')}"></td>
            <td th:text="${req.requestType}"></td>
            <td th:text="${req.citizen.lastName + ' ' + req.citizen.firstName}"></td>
            <td>
                <span class="status-badge"
                      th:classappend="'status-' + ${req.status}"
                      th:text="${req.status}"></span>
            </td>
            <td>
                <span th:if="${req.assignedEmployee != null}" th:text="${req.assignedEmployee.lastName}"></span>
                <span th:if="${req.assignedEmployee == null}" class="text-muted">-</span>
            </td>
            <td>
                <div class="d-flex gap-2">
                    <form th:if="${req.assignedEmployee == null}" th:action="@{/employee/request/{id}/assign(id=${req.id})}" th:method="post">
                        <button type="submit" class="btn-custom btn-warning-custom">Assign</button>
                    </form>

                    <a th:href="@{/employee/request/{id}(id=${req.id})}" class="btn-custom btn-secondary-custom">View</a>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(requests)}">
            <td colspan="7" class="text-center text-muted">No requests found.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
