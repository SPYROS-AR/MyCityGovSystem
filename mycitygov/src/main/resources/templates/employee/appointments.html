<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Διαχείριση Ραντεβού</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>📅 Ραντεβού Τμήματος</h2>
    <a th:href="@{/employee/dashboard}" class="btn btn-outline-secondary">← Πίσω στο Dashboard</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr>
          <th>Ημ/νία & Ώρα</th>
          <th>Πολίτης</th>
          <th>Κατάσταση</th>
          <th class="text-end">Ενέργειες</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${appointments}">
          <td th:text="${#temporals.format(app.appointmentDate, 'dd/MM/yyyy HH:mm')}"></td>
          <td>
            <span th:text="${app.citizen.firstName + ' ' + app.citizen.lastName}"></span><br>
            <small class="text-muted" th:text="${app.citizen.mobilePhoneNumber}"></small>
          </td>
          <td>
                        <span class="badge"
                              th:classappend="${app.status.name() == 'CONFIRMED' ? 'bg-success' : (app.status.name() == 'CANCELLED' ? 'bg-danger' : 'bg-warning text-dark')}"
                              th:text="${app.status}"></span>
          </td>
          <td class="text-end">
            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-sm btn-warning"
                      data-bs-toggle="modal"
                      th:data-bs-target="'#rescheduleModal' + ${app.id}">
                📅
              </button>

              <div th:if="${app.status.name() == 'SCHEDULED'}" class="btn-group">
                <form th:action="@{/employee/appointment/{id}/confirm(id=${app.id})}" method="post">
                  <button type="submit" class="btn btn-sm btn-success">✔</button>
                </form>
                <form th:action="@{/employee/appointment/{id}/cancel(id=${app.id})}" method="post" style="margin-left: 5px;">
                  <button type="submit" class="btn btn-sm btn-danger">✘</button>
                </form>
              </div>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(appointments)}">
          <td colspan="4" class="text-center text-muted">Δεν υπάρχουν προγραμματισμένα ραντεβού.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div th:each="app : ${appointments}">
  <div class="modal fade" th:id="'rescheduleModal' + ${app.id}" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Αλλαγή Ραντεβού</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form th:action="@{/employee/appointment/{id}/reschedule(id=${app.id})}" method="post">
          <div class="modal-body">
            <p>Τρέχουσα: <strong th:text="${#temporals.format(app.appointmentDate, 'dd/MM/yyyy HH:mm')}"></strong></p>
            <label class="form-label">Νέα Ημερομηνία & Ώρα:</label>
            <input type="datetime-local" name="rescheduledDate" class="form-control" required>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Άκυρο</button>
            <button type="submit" class="btn btn-primary">Αποθήκευση</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
