<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between">
        <span>MyCityGov</span>

        <div sec:authorize="isAuthenticated()">
            <span>
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>
            <span class="badge bg-light text-dark ms-2" sec:authentication="principal.role"></span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-3">
                <button type="submit" class="btn btn-sm btn-outline-light">
                    Logout
                </button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
        </div>
    </div>
</nav>

<div class="container">

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Department Appointments</h2>
        <a th:href="@{/employee/dashboard}" class="btn-custom btn-primary-custom">Back to Dashboard</a>
    </div>

    <table class="styled-table">
        <thead>
        <tr>
            <th>Date & Time</th>
            <th>Citizen</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${appointments}">
            <td th:text="${#temporals.format(app.appointmentDate, 'dd/MM/yyyy HH:mm')}"></td>
            <td>
                <span th:text="${app.citizen.firstName} + ' ' + ${app.citizen.lastName}"></span><br>
                <small class="text-muted" th:text="${app.citizen.mobilePhoneNumber}"></small>
            </td>
            <td>
                <span class="status-badge"
                      th:classappend="'status-' + ${app.status}"
                      th:text="${app.status}"></span>
            </td>
            <td>
                <div class="d-flex gap-2">
                    <button type="button" class="btn-custom btn-warning-custom"
                            data-bs-toggle="modal"
                            th:data-bs-target="'#rescheduleModal' + ${app.id}">
                        Reschedule
                    </button>

                    <div th:if="${app.status == 'SCHEDULED'}" class="d-flex gap-2">
                        <form th:action="@{/employee/appointment/{id}/confirm(id=${app.id})}" method="post">
                            <button type="submit" class="btn-custom btn-primary-custom">Confirm</button>
                        </form>
                        <form th:action="@{/employee/appointment/{id}/cancel(id=${app.id})}" method="post">
                            <button type="submit" class="btn-custom btn-danger-custom">Cancel</button>
                        </form>
                    </div>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(appointments)}">
            <td colspan="4" class="text-center text-muted">No appointments found.</td>
        </tr>
        </tbody>
    </table>
</div>

<div th:each="app : ${appointments}">
    <div class="modal fade" th:id="'rescheduleModal' + ${app.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reschedule Appointment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form th:action="@{/employee/appointment/{id}/reschedule(id=${app.id})}"
                      method="post"
                      th:onsubmit="'return combineDateTime(' + ${app.id} + ')'">

                    <div class="modal-body">
                        <p>Current: <strong th:text="${#temporals.format(app.appointmentDate, 'dd/MM/yyyy HH:mm')}"></strong></p>

                        <div class="mb-3">
                            <label class="form-label fw-bold">New Date:</label>
                            <input type="date"
                                   class="form-control date-picker"
                                   th:id="'date-' + ${app.id}"
                                   th:data-id="${app.id}"
                                   required>
                            <div class="form-text">Choose a date to see available times.</div>
                            <div th:id="'error-' + ${app.id}" class="text-danger mt-1" style="display:none;">
                                The department is closed on this day.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">New Time:</label>
                            <select class="form-select" th:id="'time-' + ${app.id}" required disabled>
                                <option value="" disabled selected>-- Select a Date First --</option>
                            </select>
                        </div>

                        <input type="hidden" name="rescheduledDate" th:id="'final-' + ${app.id}">
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    // Convert Java List<DepartmentScheduleView> to a JavaScript Object
    // Format: { "MONDAY": {start: "08:00", end: "16:00"}, "TUESDAY": ... }
    const rawSchedules = /*[[${schedules}]]*/ [];
    const scheduleMap = {};

    if (rawSchedules) {
        rawSchedules.forEach(sch => {
            scheduleMap[sch.dayOfWeek] = {
                start: sch.startTime, // e.g., "09:00:00"
                end: sch.endTime      // e.g., "17:00:00"
            };
        });
    }
    /*]]>*/
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const dateInputs = document.querySelectorAll('.date-picker');
        const today = new Date().toISOString().split("T")[0];

        // Mapping JS getDay() (0=Sun) to Java DayOfWeek Strings
        const jsDayToJava = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];

        dateInputs.forEach(input => {
            input.min = today;

            input.addEventListener('change', function() {
                const id = this.getAttribute('data-id');
                const errorDiv = document.getElementById('error-' + id);
                const timeSelect = document.getElementById('time-' + id);

                // Clear previous options
                timeSelect.innerHTML = '<option value="" disabled selected>-- Choose Time --</option>';
                timeSelect.disabled = true;
                errorDiv.style.display = 'none';

                if (!this.value) return;

                const selectedDate = new Date(this.value);
                const dayName = jsDayToJava[selectedDate.getDay()];
                const daySchedule = scheduleMap[dayName];

                if (!daySchedule) {
                    // Department is closed on this day
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = "The department is closed on " + dayName.toLowerCase() + "s.";
                    this.value = ''; // Reset date
                } else {
                    // Department is open -> Generate Time Slots
                    generateTimeSlots(timeSelect, daySchedule.start, daySchedule.end);
                    timeSelect.disabled = false;
                }
            });
        });
    });

    function generateTimeSlots(selectElement, startTimeStr, endTimeStr) {
        // Parse "HH:mm:ss" or "HH:mm" to minutes
        const start = parseTimeToMinutes(startTimeStr);
        const end = parseTimeToMinutes(endTimeStr);

        // Generate slots every 30 minutes
        for (let time = start; time < end; time += 30) {
            const timeString = minutesToTime(time);
            const option = document.createElement("option");
            option.value = timeString;
            option.text = timeString;
            selectElement.appendChild(option);
        }
    }

    function parseTimeToMinutes(timeStr) {
        const parts = timeStr.split(":");
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    function minutesToTime(minutes) {
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        // Format as HH:mm
        return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
    }

    function combineDateTime(id) {
        const dateInput = document.getElementById('date-' + id);
        const timeInput = document.getElementById('time-' + id);
        const finalInput = document.getElementById('final-' + id);

        if (!dateInput.value || !timeInput.value) {
            alert("Please select both date and time.");
            return false;
        }
        finalInput.value = dateInput.value + 'T' + timeInput.value;
        return true;
    }
</script>
</body>
</html>
