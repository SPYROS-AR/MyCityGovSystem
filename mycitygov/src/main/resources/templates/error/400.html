<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>400 - Bad Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between">
        <a th:href="@{/}" class="text-decoration-none text-white">
            <span class="h4">MyCityGov</span>
        </a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">

            <h1 class="display-1 fw-bold text-danger">400</h1>
            <h2 class="mb-3">Bad Request</h2>

            <p class="lead mb-4">
                The server could not understand the request due to invalid syntax.
                Please check your input and try again.
            </p>

            <div class="d-flex justify-content-center gap-3">
                <a href="javascript:history.back()" class="btn btn-secondary">
                    Go Back
                </a>

                <a th:href="@{/}" class="btn-custom btn-secondary-custom text-white text-decoration-none px-4 py-2 rounded">
                    Back to Home
                </a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
