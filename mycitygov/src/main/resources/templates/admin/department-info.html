<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Department Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between">
        <span>MyCityGov - Admin</span>
        <div sec:authorize="isAuthenticated()">
            <span>
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline ms-3">
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Department Details</h2>
        <a th:href="@{/admin/departments}" class="btn-custom btn-secondary-custom">Back to List</a>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0 text-primary">Basic Info</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{'/admin/departments/' + ${department.id} + '/update'}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" th:value="${department.name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="4"
                                      th:text="${department.description}"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Update Info</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-success">Weekly Schedule</h5>
                </div>
                <div class="card-body">

                    <table class="table table-sm table-bordered text-center mb-4">
                        <thead class="table-light">
                        <tr>
                            <th>Day</th>
                            <th>Open</th>
                            <th>Close</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="s : ${schedule}">
                            <td th:text="${s.dayOfWeek}"></td>
                            <td th:text="${s.startTime}"></td>
                            <td th:text="${s.endTime}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(schedule)}">
                            <td colspan="3" class="text-muted small">No schedule set yet.</td>
                        </tr>
                        </tbody>
                    </table>

                    <hr>

                    <h6>Set Schedule for a Day</h6>
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>Invalid Input:</strong> <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success" role="alert">
                        <span th:text="${successMessage}"></span>
                    </div>

                    <form th:action="@{'/admin/departments/' + ${department.id} + '/schedule'}" method="post"
                          id="scheduleForm">

                        <div class="alert alert-info py-2 mb-3" role="alert">
                            <small><i class="bi bi-info-circle"></i> To remove a schedule (close for the day), use the
                                <b>"Mark as Closed"</b> button.</small>
                        </div>

                        <div class="row g-2 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label small text-muted fw-bold">Select Day</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                                    <select name="day" class="form-select">
                                        <option th:each="day : ${days}" th:value="${day}" th:text="${day}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label small text-muted fw-bold">Open</label>
                                <input type="time" id="startTime" name="start" class="form-control form-control-sm"
                                       value="09:00" required>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label small text-muted fw-bold">Close</label>
                                <input type="time" id="endTime" name="end" class="form-control form-control-sm"
                                       value="17:00" required>
                            </div>

                            <div class="col-md-2">
                                <button type="button" class="btn btn-outline-danger btn-sm w-100" onclick="setClosed()">
                                    Closed
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success btn-sm w-100 mt-3">
                            <i class="bi bi-save"></i> Save Schedule
                        </button>
                    </form>

                    <script>
                        function setClosed() {
                            document.getElementById('startTime').value = "00:00";
                            document.getElementById('endTime').value = "00:00";
                        }
                    </script>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
