<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Request Types</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar-custom">
    <div class="container d-flex justify-content-between">
        <span>MyCityGov</span>

        <div sec:authorize="isAuthenticated()">
            <span>
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>
            <span class="badge bg-light text-dark ms-2" sec:authentication="principal.role"></span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-3">
                <button type="submit" class="btn btn-sm btn-outline-light">
                    Logout
                </button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Available Request Types</h2>
        <a th:href="@{/admin/request-types/new}" class="btn-custom btn-primary-custom">+ New Request Type</a>
    </div>

    <table class="styled-table table table-hover">
        <thead>
        <tr>
            <th>Service Name</th>
            <th>Category</th>
            <th>Department</th>
            <th>SLA Days</th>
            <th>Status</th>
            <th style="width: 50px;">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="type : ${requestTypes}">
            <td th:text="${type.name}"></td>
            <td th:text="${type.category}"></td>
            <td th:text="${type.departmentName}"></td>
            <td th:text="${type.slaDays}"></td>
            <td>
                         <span class="badge rounded-pill"
                               th:classappend="${type.active} ? 'text-bg-success' : 'text-bg-danger'"
                               th:text="${type.active} ? 'Active' : 'Inactive'">
                         </span>
            </td>

            <td>
                <div class="dropdown">
                    <button class="btn btn-link text-dark p-0" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                        <i class="bi bi-three-dots-vertical"></i>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end shadow">

                        <li>
                            <form th:action="@{/admin/request-types/{id}/toggle(id=${type.id})}" th:method="post">
                                <button class="dropdown-item" type="submit">
                                    <span th:text="${type.active} ? 'Deactivate' : 'Activate'"></span>
                                </button>
                            </form>
                        </li>

                        <li>
                            <button class="dropdown-item" type="button"
                                    data-bs-toggle="modal"
                                    data-bs-target="#reassignModal"
                                    th:onclick="'setRequestTypeId(' + ${type.id} + ')'">
                                Reassign Department
                            </button>
                        </li>
                    </ul>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/admin/dashboard}" class="btn-custom btn-secondary-custom">Back to Dashboard</a>
    </div>
</div>

<div class="modal fade" id="reassignModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/request-types/reassign}" th:method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Reassign Department</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Select the new department for this service:</p>
                    <input type="hidden" id="newRequestTypeId" name="requestTypeId"/>

                    <select name="departmentId" class="form-select" required>
                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}"></option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
