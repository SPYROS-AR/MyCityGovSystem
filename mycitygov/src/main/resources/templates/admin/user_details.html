<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar-custom"></nav>

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-white">
            <h3 class="text-primary">User Profile</h3>
            <span class="badge bg-secondary" th:text="${userType}">ROLE</span>
        </div>
        <div class="card-body">
            <p><strong>Username:</strong> <span th:text="${userDetails.username}"></span></p>
            <p><strong>Full Name:</strong> <span th:text="${userDetails.firstName} + ' ' + ${userDetails.lastName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${userDetails.email}"></span></p>

            <div th:if="${userType == 'CITIZEN'}">
                <hr>
                <h5 class="text-muted">Citizen Details</h5>
                <p><strong>Tax ID (AFM):</strong> <span th:text="${userDetails.nationalId}"></span></p>
                <p><strong>Phone:</strong> <span th:text="${userDetails.mobilePhoneNumber}"></span></p>
                <p><strong>Address:</strong> <span th:text="${userDetails.address}"></span></p>
            </div>

            <div th:if="${userType == 'EMPLOYEE'}">
                <hr>
                <h5 class="text-muted">Employee Details</h5>
                <p><strong>Department:</strong>
                    <span th:text="${userDetails.department?.name} ?: 'Not Assigned'"></span>
                </p>
            </div>

            <div class="mt-4">
                <a th:href="@{/admin/users}" class="btn-custom btn-secondary-custom">Back to Users</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
