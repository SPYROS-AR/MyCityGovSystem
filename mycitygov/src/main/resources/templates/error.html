<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error - MyCityGov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #f4f4f4;">

<div class="text-center">
    <div class="mb-4">
        <i class="bi bi-exclamation-octagon-fill text-danger" style="font-size: 4rem;"></i>
    </div>
    <h1 class="display-4 fw-bold text-dark">Oops!</h1>
    <h2 class="mb-3 text-muted">Something went wrong</h2>

    <p class="lead mb-4">
        We encountered an unexpected error. Please try again later.
    </p>

    <div th:if="${message}" class="alert alert-danger d-inline-block border" style="max-width: 600px;">
        <small th:text="${message}"></small>
    </div>
    <br><br>

    <a th:href="@{/login}" class="btn-custom btn-primary-custom px-4">
        <i class="bi bi-house-door-fill"></i> Go to Homepage
    </a>
</div>

</body>
</html>
