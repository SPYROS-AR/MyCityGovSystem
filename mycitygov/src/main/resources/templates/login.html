<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - MyCityGov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #f4f4f4;">

<div class="card shadow p-4" style="max-width: 400px; width: 100%;">
    <div class="text-center mb-4">
        <h2 style="color: #009879;">MyCityGov</h2>
        <p class="text-muted">Sign in to your account</p>
    </div>

    <form id="loginForm" th:action="@{/login}" method="post">

        <div id="error-alert" class="alert alert-danger d-none">
            Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out.
        </div>

        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" required autofocus>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100" style="background-color: #009879; border: none;">Sign In</button>
    </form>

    <div class="mt-3 text-center">
        <small>
            <a th:href="@{/citizen/register}" class="text-decoration-none fw-bold" style="color: #009879;">Register here</a> <br>(Only for citizens)
        </small>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        // Stop the form from refreshing the page immediately
        event.preventDefault();

        const form = event.target;
        const formData = new FormData(form);
        const errorAlert = document.getElementById('error-alert');

        // Send the data via fetch (AJAX)
        fetch(form.action, {
            method: 'POST',
            body: formData,
            // Depending on your backend setup, you might need to handle CSRF tokens here
        })
            .then(response => {
                // Check if the login failed
                if (response.url.includes('error')) {
                    // Show the error message without refreshing
                    errorAlert.classList.remove('d-none');
                    // Optional: Clear the password field
                    document.getElementById('password').value = '';
                } else {
                    // D. If login is successful, manually redirect the user
                    window.location.href = response.url;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                errorAlert.textContent = "An unexpected error occurred.";
                errorAlert.classList.remove('d-none');
            });
    });
</script>

</body>
</html>
