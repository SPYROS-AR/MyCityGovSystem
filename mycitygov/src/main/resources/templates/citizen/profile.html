<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>My Profile | MyCityGov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <span>MyCityGov</span>

        <div class="text-white">
            <span sec:authorize="isAuthenticated()">
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow border-0">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4">
            <h3 class="mb-0" style="color: #009879;">Citizen Profile</h3>
        </div>

        <div class="card-body p-4">
            <ul class="list-group list-group-flush mb-4">
                <li class="list-group-item">
                    <strong>First Name:</strong> <span th:text="${citizen.firstName}"></span>
                </li>
                <li class="list-group-item">
                    <strong>Last Name:</strong> <span th:text="${citizen.lastName}"></span>
                </li>
                <li class="list-group-item">
                    <strong>Email:</strong> <span th:text="${citizen.email}"></span>
                </li>
                <li class="list-group-item">
                    <strong>Tax ID:</strong> <span th:text="${citizen.nationalId}"></span>
                </li>
                <li class="list-group-item">
                    <strong>Mobile Phone Number:</strong> <span th:text="${citizen.mobilePhoneNumber}"></span>
                </li>
                <li class="list-group-item">
                    <strong>Address:</strong> <span th:text="${citizen.address}"></span>
                </li>
            </ul>

            <div class="text-end">
                <a th:href="@{/citizen/requests/my}" class="btn-custom btn-secondary-custom">Back to Requests</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
