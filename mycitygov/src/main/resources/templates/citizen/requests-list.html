<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>My Requests | MyCityGov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <span>MyCityGov</span>

        <div class="text-white">
            <span sec:authorize="isAuthenticated()">
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Request History</h2>
        <div>
            <a th:href="@{/citizen/requests/new}" class="btn-custom btn-primary-custom">+ New Request</a>

            <a th:href="@{/citizen/appointments/my}" class="btn-custom btn-secondary-custom ms-2">My Appointments</a>

            <a th:href="@{/citizen/profile}" class="btn-custom btn-warning-custom ms-2 text-dark">Profile</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="styled-table">
            <thead>
            <tr>
                <th>Protocol</th>
                <th>Type</th>
                <th>Date</th>
                <th>Status</th>
                <th>Description</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="req : ${requests}">
                <td th:text="${req.protocolNumber}" class="fw-bold"></td>
                <td th:text="${req.requestTypeName}"></td>
                <td th:text="${#temporals.format(req.submittedDate, 'dd/MM/yyyy')}"></td>
                <td>
                    <span class="status-badge"
                          th:classappend="'status-' + ${req.status}"
                          th:text="${req.status}"></span>
                </td>
                <td th:text="${req.description}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(requests)}">
                <td colspan="5" class="text-center text-muted">No requests found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
