<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>New Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <span>MyCityGov</span>

        <div class="text-white">
            <span sec:authorize="isAuthenticated()">
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Submit New Request</h2>

        <div>
            <a th:href="@{/citizen/requests/my}" class="btn-custom btn-secondary-custom">Back to Requests</a>
            <a th:href="@{/citizen/profile}" class="btn-custom btn-warning-custom ms-2 text-dark">Profile</a>
        </div>
    </div>

    <form th:action="@{/citizen/requests}" method="post" enctype="multipart/form-data" style="max-width: 600px;">

        <div class="mb-3">
            <label class="form-label fw-bold">Request Type:</label>
            <select name="requestTypeId" id="requestTypeSelect" class="form-select" onchange="updateRequiredDocs()" required>
                <option value="" disabled selected>Select...</option>

                <option th:each="type : ${requestTypes}"
                        th:value="${type.id}"
                        th:text="${type.name}"
                        th:data-docs="${type.requiredDocuments}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Description:</label>
            <textarea name="description" class="form-control" rows="5" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Required Documents</label>
            <textarea id="docsDisplay"
                      class="form-control bg-light"
                      rows="3"
                      readonly
                      placeholder="Select a request type above to see requirements..."></textarea>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">Attachment (Optional):</label>
            <input type="file" name="attachment" class="form-control" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
            <div class="form-text">Supported formats: PDF, Images, Word documents.</div>
        </div>

        <button type="submit" class="btn-custom btn-primary-custom px-4">Submit Request</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function updateRequiredDocs() {

        var selectBox = document.getElementById("requestTypeSelect");
        var textBox = document.getElementById("docsDisplay");

        var selectedOption = selectBox.options[selectBox.selectedIndex];


        var requiredDocs = selectedOption.getAttribute("data-docs");

        if (requiredDocs) {
            textBox.value = requiredDocs;
        } else {
            textBox.value = "No specific documents required for this type.";
        }
    }
</script>
</body>
</html>
