<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Citizen Login | MyCityGov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white text-center py-4">
                    <h3 style="color: #009879;">MyCityGov</h3>
                    <p class="text-muted mb-0">Citizen Portal Login</p>
                </div>
                <div class="card-body p-4">

                    <div th:if="${param.success}" class="alert alert-success">
                        Registration successful! Please sign in.
                    </div>

                    <form th:action="@{/citizen/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username or Email</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn-custom btn-primary-custom w-100">Sign In</button>
                    </form>
                </div>
                <div class="card-footer bg-white text-center py-3">
                    <span class="text-muted">Don't have an account?</span>
                    <a th:href="@{/citizen/register}" class="text-decoration-none fw-bold" style="color: #009879;">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
