<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>My Appointments | MyCityGov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <span>MyCityGov</span>

        <div class="text-white">
            <span sec:authorize="isAuthenticated()">
                User: <strong sec:authentication="principal.firstName"></strong>
                      <strong sec:authentication="principal.lastName"></strong>
            </span>

            <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Appointments</h2>
        <div>
            <a th:href="@{/citizen/appointments/new}" class="btn-custom btn-primary-custom">+ Book Appointment</a>

            <a th:href="@{/citizen/requests/my}" class="btn-custom btn-secondary-custom ms-2">Back to Requests</a>

            <a th:href="@{/citizen/profile}" class="btn-custom btn-warning-custom ms-2 text-dark">Profile</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="styled-table">
            <thead>
            <tr>
                <th>Date & Time</th>
                <th>Department</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${appointments}">
                <td th:text="${#temporals.format(app.appointmentDate, 'dd/MM/yyyy HH:mm')}" class="fw-bold"></td>
                <td th:text="${app.departmentName}"></td>
                <td>
                    <span class="status-badge"
                          th:classappend="'status-' + ${app.status}"
                          th:text="${app.status}"></span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(appointments)}">
                <td colspan="3" class="text-center text-muted">No appointments found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
