<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a th:href="@{/}" class="text-white text-decoration-none fs-4">MyCityGov</a>

        <div class="text-white">
            <span sec:authorize="isAuthenticated()">
                User: <strong sec:authentication="principal.firstName"></strong>
            </span>
            <a th:href="@{/citizen/profile}" class="btn btn-sm btn-outline-light ms-2">Profile</a>
            <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow border-0">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4">
            <h3 class="mb-0 text-warning">+ Book Appointment</h3>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger" role="alert">
                <strong>Error:</strong> <span th:text="${error}"></span>
            </div>

            <form id="bookingForm" th:action="@{/citizen/appointments}" method="post" onsubmit="return submitForm()">

                <div class="mb-4">
                    <label class="form-label fw-bold">Select Department:</label>
                    <select id="departmentId" name="departmentId" class="form-select" required onchange="onDepartmentChange()">
                        <option value="" disabled selected>-- Select Department --</option>
                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}"></option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Select Date:</label>
                    <input type="text" id="datePart" class="form-control" placeholder="Select a department first..." disabled required>
                    <div id="scheduleInfo" class="form-text text-info"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Select Time:</label>
                    <select id="timePart" class="form-select" disabled required>
                        <option value="" disabled selected>-- Select Date first --</option>
                    </select>
                </div>

                <input type="hidden" name="appointmentDate" id="finalDateTime">

                <div class="d-flex justify-content-between mt-5">
                    <a th:href="@{/citizen/appointments/my}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" id="submitBtn" class="btn-custom btn-warning-custom px-4 text-dark">Confirm Booking</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    let currentSchedules = []; // Stores schedule data from API
    let fpInstance = null;     // Flatpickr instance

    // 1. When Department Changes -> Fetch Schedule
    async function onDepartmentChange() {
        const deptId = document.getElementById("departmentId").value;
        const dateInput = document.getElementById("datePart");
        const timeSelect = document.getElementById("timePart");
        const infoDiv = document.getElementById("scheduleInfo");

        // Reset fields
        dateInput.value = "";
        dateInput.disabled = true;
        dateInput.placeholder = "Loading schedule...";
        timeSelect.innerHTML = '<option value="" disabled selected>-- Select Date first --</option>';
        timeSelect.disabled = true;
        infoDiv.textContent = "";

        try {
            // Call API
            const response = await fetch(`/api/citizen/department/${deptId}/schedule`);
            if (!response.ok) throw new Error("Failed to fetch schedule");

            currentSchedules = await response.json();

            // Re-enable and Re-init Date Picker
            dateInput.disabled = false;
            dateInput.placeholder = "dd/mm/yyyy";

            // Map Java DayOfWeek (MONDAY) to JS getDay() (1)
            // Java: MONDAY, TUESDAY... SUNDAY
            // JS: 0=Sun, 1=Mon, ..., 6=Sat
            const dayMap = {
                "SUNDAY": 0, "MONDAY": 1, "TUESDAY": 2, "WEDNESDAY": 3,
                "THURSDAY": 4, "FRIDAY": 5, "SATURDAY": 6
            };

            const allowedDays = currentSchedules.map(s => dayMap[s.dayOfWeek]);

            if (fpInstance) fpInstance.destroy();

            fpInstance = flatpickr("#datePart", {
                dateFormat: "Y-m-d",
                altInput: true,
                altFormat: "d/m/Y",
                minDate: "today",
                disable: [
                    function(date) {
                        // Disable if day is NOT in allowed list
                        return !allowedDays.includes(date.getDay());
                    }
                ],
                onChange: function(selectedDates, dateStr) {
                    updateTimeSlots(selectedDates[0]);
                }
            });

            infoDiv.textContent = "Schedule loaded based on department hours.";

        } catch (error) {
            console.error(error);
            dateInput.placeholder = "Error loading schedule";
        }
    }

    // 2. When Date Selected -> Populate Time Slots
    function updateTimeSlots(date) {
        const timeSelect = document.getElementById("timePart");
        timeSelect.innerHTML = '<option value="" disabled selected>-- Choose Time --</option>';
        timeSelect.disabled = false;

        if (!date) return;

        // Find schedule for this day
        const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        const dayName = days[date.getDay()];
        const schedule = currentSchedules.find(s => s.dayOfWeek === dayName);

        if (!schedule) return;

        // Generate 30-min slots between Start and End time
        // API returns "08:00:00". We need minutes.
        const startParts = schedule.startTime.split(":");
        const endParts = schedule.endTime.split(":");

        let startMins = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);
        let endMins = parseInt(endParts[0]) * 60 + parseInt(endParts[1]);

        // Stop 30 mins before closing time to allow appointment duration
        endMins -= 30;

        for (let time = startMins; time <= endMins; time += 30) {
            const h = Math.floor(time / 60).toString().padStart(2, '0');
            const m = (time % 60).toString().padStart(2, '0');
            const val = `${h}:${m}`;

            const opt = document.createElement("option");
            opt.value = val;
            opt.textContent = val;
            timeSelect.appendChild(opt);
        }
    }

    // 3. Combine Date+Time on Submit
    function submitForm() {
        const dateVal = document.getElementById('datePart').value;
        const timeVal = document.getElementById('timePart').value;

        if (!dateVal || !timeVal) {
            alert("Please select both date and time.");
            return false;
        }

        const finalString = dateVal + 'T' + timeVal;
        document.getElementById('finalDateTime').value = finalString;

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Booking...";

        return true;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
