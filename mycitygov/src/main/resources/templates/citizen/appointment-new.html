<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a th:href="@{/}" class="text-white text-decoration-none fs-4">MyCityGov</a>

        <div class="text-white">
            <span sec:authorize="isAuthenticated()">
                User: <strong sec:authentication="principal.firstName"></strong>
            </span>
            <a th:href="@{/citizen/profile}" class="btn btn-sm btn-outline-light ms-2">Profile</a>
            <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow border-0">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4">
            <h3 class="mb-0 text-warning">+ Book Appointment</h3>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger" role="alert">
                <strong>Error:</strong> <span th:text="${error}"></span>
            </div>

            <form id="bookingForm" th:action="@{/citizen/appointments}" method="post" onsubmit="return submitForm()">

                <div class="mb-4">
                    <label class="form-label fw-bold">Select Department:</label>
                    <select name="departmentId" class="form-select" required>
                        <option value="" disabled selected>-- Select Department --</option>
                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}"></option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Select Date:</label>
                    <input type="text" id="datePart" class="form-control" placeholder="dd/mm/yyyy" required>
                    <div class="form-text">Available: Monday - Friday</div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Select Time:</label>
                    <select id="timePart" class="form-select" required>
                        <option value="" disabled selected>-- Choose Time --</option>
                        <option value="08:00">08:00</option>
                        <option value="08:30">08:30</option>
                        <option value="09:00">09:00</option>
                        <option value="09:30">09:30</option>
                        <option value="10:00">10:00</option>
                        <option value="10:30">10:30</option>
                        <option value="11:00">11:00</option>
                        <option value="11:30">11:30</option>
                        <option value="12:00">12:00</option>
                        <option value="12:30">12:30</option>
                        <option value="13:00">13:00</option>
                        <option value="13:30">13:30</option>
                        <option value="14:00">14:00</option>
                        <option value="14:30">14:30</option>
                        <option value="15:00">15:00</option>
                    </select>
                </div>

                <input type="hidden" name="appointmentDate" id="finalDateTime">

                <div class="d-flex justify-content-between mt-5">
                    <a th:href="@{/citizen/appointments/my}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" id="submitBtn" class="btn-custom btn-warning-custom px-4 text-dark">Confirm Booking</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    // 1. Initialize Flatpickr
    const fp = flatpickr("#datePart", {
        dateFormat: "Y-m-d",
        altInput: true,
        altFormat: "d/m/Y",
        minDate: "today",
        disable: [
            function(date) {
                return (date.getDay() === 0 || date.getDay() === 6);
            }
        ]
    });

    // 2. Combine Date+Time and Disable Button
    function submitForm() {
        const dateVal = document.getElementById('datePart').value;
        const timeVal = document.getElementById('timePart').value;

        if (!dateVal || !timeVal) {
            alert("Please select both date and time.");
            return false;
        }

        // Combine to ISO format: YYYY-MM-DDTHH:mm
        const finalString = dateVal + 'T' + timeVal;
        document.getElementById('finalDateTime').value = finalString;

        // Disable button to prevent double-booking
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Booking...";

        return true;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
